# ============================================================
# Perfil EC2 - ExternalizaciĂ³n de ConfiguraciĂ³n
# ============================================================
# Este perfil sobrescribe valores sensibles de application.properties
# usando variables de entorno. Activar con: spring.profiles.active=ec2

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:300000}

# PolĂ­tica de bloqueo
jwt.max-failed-attempts=${JWT_MAX_FAILED_ATTEMPTS:3}

# EncriptaciĂ³n AES-256 (clave Base64, 32 bytes = 256 bits)
encriptacion.clave-aes=${AES_KEY}

# DynamoDB (AWS real)
dynamodb.endpoint=${DYNAMODB_ENDPOINT}
dynamodb.region=${DYNAMODB_REGION}
dynamodb.access-key=${DYNAMODB_ACCESS_KEY}
dynamodb.secret-key=${DYNAMODB_SECRET_KEY}
